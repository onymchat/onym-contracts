name: Release Contracts

# On tag push:
#   1. The `build-contracts` matrix job builds each of the 5 sep-*
#      contracts to WASM with `stellar contract build --optimize` and
#      uploads the resulting `<contract>_v<version>.wasm` files as
#      release assets on the tag. WASMs carry the `source_repo` and
#      `home_domain` metadata stamps via `--meta` so stellar.expert's
#      contract page can link back to this repo + tag.
#   2. After the matrix completes, the `bench-gas` job deploys the
#      freshly-tagged contracts to Stellar testnet, measures per-op
#      fees via `stellar contract invoke`, renders a markdown table
#      + JSONL, and overwrites the release body with the rendered
#      table. Raw JSONL stays on the workflow run as an artifact.
#
# History note: earlier drafts used `stellar-expert/soroban-build-workflow`
# for the contract-build half, which gave us source-code attestation
# automatically. That action pins `stellar/stellar-cli@v25.1.0`, and
# v25.1.0 of `stellar contract build` rejects rustc 1.91.0 — but
# `soroban-sdk = "=26.0.0-rc.1"` requires 1.91.0 as its floor. The
# action has no override hook for the CLI version. v0.0.1 cuts that
# knot by building manually with stellar-cli v26.0.0 (already proven
# in the bench-gas job below) and forgoing the attestation feature
# until the upstream action ships a v26-aware release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-contracts:
    name: build ${{ matrix.contract }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - contract: sep-anarchy
            package: sep-anarchy-contract
          - contract: sep-democracy
            package: sep-democracy-contract
          - contract: sep-oligarchy
            package: sep-oligarchy-contract
          - contract: sep-oneonone
            package: sep-oneonone-contract
          - contract: sep-tyranny
            package: sep-tyranny-contract
    env:
      # The contract crates pin rustc 1.91.0 via per-crate
      # `rust-toolchain.toml` (soroban-sdk 26.0.0-rc.1 floor). But
      # `stellar contract build` v26.0.0 has a hard-coded blocklist
      # that rejects rustc 1.81 / 1.82 / 1.83 / 1.91.0 (versions known
      # to produce broken WASM). Setting RUSTUP_TOOLCHAIN=stable wins
      # over rust-toolchain.toml: cargo uses whatever stable is on the
      # runner, which currently sits past 1.91.0 — outside the
      # blocklist while still satisfying the soroban-sdk 26 floor.
      RUSTUP_TOOLCHAIN: stable
      WORK_DIR: plonk/${{ matrix.contract }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Install stellar CLI
        env:
          # Same pin + sha256 the bench-gas job uses below. v26.0.0
          # accepts rustc 1.91.0; v25.1.0 (the version the upstream
          # reusable workflow pins) rejects it.
          STELLAR_VERSION: '26.0.0'
          STELLAR_SHA256: '31c83db342d1184b31f6591e739950eb45756be46dcd7bb57e4f38e91ea32e84'
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          tarball="$tmp/stellar-cli.tar.gz"
          curl -sSLf -o "$tarball" \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_VERSION}/stellar-cli-${STELLAR_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${STELLAR_SHA256}  ${tarball}" | sha256sum -c -
          tar -xz -C "$tmp" -f "$tarball"
          binary="$(find "$tmp" -maxdepth 3 -type f -name stellar -perm -u+x | head -1)"
          test -n "$binary" || { echo "no stellar binary in tarball" >&2; exit 1; }
          sudo install -m 0755 "$binary" /usr/local/bin/stellar
          rm -rf "$tmp"
          stellar --version

      - name: Build contract WASM
        working-directory: ${{ env.WORK_DIR }}
        run: |
          set -euo pipefail
          out="$(mktemp -d)"

          # `--optimize` runs `stellar contract optimize` inline after
          # the wasm32 build, matching the asset bytes the upstream
          # reusable workflow used to produce.
          stellar contract build \
            --optimize \
            --package "${{ matrix.package }}" \
            --out-dir "$out" \
            --meta "source_repo=github:${{ github.repository }}" \
            --meta "home_domain=onym.chat"

          # `cargo metadata` is the source of truth for the package
          # version; bake it into the asset name so stellar.expert can
          # pick the right WASM by tag.
          version="$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "${{ matrix.package }}") | .version')"
          test -n "$version" || { echo "no package version" >&2; exit 1; }

          # Reusable-workflow naming convention: `${package}_v${version}.wasm`.
          # Preserved so downstream tooling that scrapes release assets
          # keeps working across the cutover.
          wasm_name="${{ matrix.package }}_v${version}.wasm"
          src="$(find "$out" -maxdepth 1 -name '*.wasm' | head -1)"
          test -n "$src" || { echo "no wasm produced in $out" >&2; ls -la "$out" >&2; exit 1; }
          mv "$src" "${{ github.workspace }}/$wasm_name"
          echo "WASM_PATH=${{ github.workspace }}/$wasm_name" >> "$GITHUB_ENV"

      - name: Attach WASM to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.WASM_PATH }}
          fail_on_unmatched_files: true

  bench-gas:
    needs: [build-contracts]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # The bench job builds the prover-side `gen-membership-proof` /
      # `gen-update-proof` tools via `cargo` (not via stellar-cli), so
      # we want the top-level rust-toolchain.toml's pin to NOT win —
      # let RUSTUP_TOOLCHAIN=stable take precedence. The contract
      # crates' per-crate rust-toolchain.toml still pins 1.91.0 for
      # `stellar contract build`; that's a separate code path.
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-gas-rust-${{ hashFiles('plonk/**/Cargo.toml') }}

      - name: Install stellar CLI
        env:
          # Pin to the version the maintainer's local dev env runs
          # (`stellar --version` → 26.0.0). Bump in lockstep with the
          # rest of the repo if a deploy script switches.
          STELLAR_VERSION: '26.0.0'
          # SHA-256 of stellar-cli-26.0.0-x86_64-unknown-linux-gnu.tar.gz,
          # captured 2026-05-01 from the official GitHub release. The job
          # has `contents: write`, so verifying the toolchain we rely on
          # before extracting is cheap insurance against an upstream
          # release-asset compromise.
          STELLAR_SHA256: '31c83db342d1184b31f6591e739950eb45756be46dcd7bb57e4f38e91ea32e84'
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          tarball="$tmp/stellar-cli.tar.gz"
          curl -sSLf -o "$tarball" \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_VERSION}/stellar-cli-${STELLAR_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${STELLAR_SHA256}  ${tarball}" | sha256sum -c -
          tar -xz -C "$tmp" -f "$tarball"
          binary="$(find "$tmp" -maxdepth 3 -type f -name stellar -perm -u+x | head -1)"
          test -n "$binary" || { echo "no stellar binary in tarball" >&2; exit 1; }
          sudo install -m 0755 "$binary" /usr/local/bin/stellar
          rm -rf "$tmp"
          stellar --version

      - name: Configure stellar testnet
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" || true

      - name: Run gas benchmarks
        env:
          BENCH_NETWORK: testnet
          BENCH_TAG: ${{ github.ref_name }}
        run: |
          chmod +x scripts/bench-gas/run.sh \
                   scripts/bench-gas/setup.sh \
                   scripts/bench-gas/contracts/*.sh
          bash scripts/bench-gas/run.sh

      - name: Upload workflow artifacts (raw JSONL + rendered body)
        uses: actions/upload-artifact@v4
        with:
          name: gas-benchmarks-${{ github.ref_name }}
          path: |
            scripts/bench-gas/results.md
            scripts/bench-gas/results.jsonl
          if-no-files-found: error

      - name: Set release body to bench output
        # Replaces the release body wholesale with the rendered
        # markdown (table + contract addresses linking to
        # stellar.expert). The raw JSONL is still attached as a
        # workflow artifact for downstream tooling but no longer
        # rides along on the release itself.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: scripts/bench-gas/results.md
